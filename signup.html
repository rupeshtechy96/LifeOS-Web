<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup - LifeOS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <h2>LifeOS</h2>
    <div>
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="journal.html">Journal</a>
      <a href="profile.html">Profile</a>
      <a href="about.html">About</a>
      <a href="login.html">Login</a>
      <a href="signup.html">Signup</a>
      <button id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="container">
    <header>
      <h1>Create Account</h1>
      <p>Sign up to start your discipline journey.</p>
    </header>

    <section class="card">
      <div class="form-group">
        <input type="text" id="signupName" placeholder="Enter your name" />
      </div>

      <div class="form-group">
        <input type="email" id="signupEmail" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <input type="password" id="signupPassword" placeholder="Enter your password" />
      </div>

      <button id="signupBtn">Sign Up</button>
      <p id="signupMessage"></p>
    </section>
  </div>

  <footer style="text-align:center; padding:20px;">
    <p>LifeOS — Built by Patelji</p>
  </footer>

  <script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
